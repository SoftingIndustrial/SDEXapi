                      http://opcfoundation.org/UA/:
                        uri: http://opcfoundation.org/UA/
                        name: OPC UA Standard NodeSet
                        id: 00000000-0000-0000-0000-000000000000
                        status: ok
                        version: 1.05.02
                        date: '2022-11-01T00:00:00Z'
