      summary: Browse HTTP UA server nodes
      description: 'Issues a forward hierarchical browse transaction using the specified
        session type name.

        Returns, by default, the `NodeId`, `DisplayName`, `NodeClass`, and `BrowseName`
        of the resulting nodes.

        Additional information (attributes) of the resulting nodes can be obtained
        if explicitly requested through `AdditionalAttributes`.

        '
      requestBody:
        required: true
