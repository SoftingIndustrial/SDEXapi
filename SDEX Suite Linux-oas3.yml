    httpuaserverBrowseRequest:
      type: object
      required:
      - SessionName
      - NodeIds
      properties:
        SessionName:
          type: string
          description: Name of the HTTP UA server session type.
        NodeIds:
          type: array
          description: List of node IDs to browse.
          items:
            type: string
        AdditionalAttributes:
          type: array
          description: 'Optional list of additional node attributes to retrieve. If
            not specified, the default information for a resulting node is retrieved:
            `NodeId`, `DisplayName`, `NodeClass`, and `BrowseName`.

            Possible values are: `Description`, `WriteMask`, `UserWriteMask`, `IsAbstract`,
            `Symmetric`, `InverseName`, `ContainsNoLoops`, `EventNotifier`, `Value`,
            `DataTypeId`, `BaseDataType`, `ValueRank`, `ArrayDimensions`, `AccessLevel`,
            `UserAccessLevel`, `MinSamplingInterval`, `Historizing`, `Executable`,
            `UserExecutable`, `DataTypeDefinition`, `RolePermissions`, `UserRolePermissions`,
            `AccessRestrictions`, `AccessLevelEx`.

            '
          items:
            type: string
            enum:
            - Description
            - WriteMask
            - UserWriteMask
            - IsAbstract
            - Symmetric
            - InverseName
            - ContainsNoLoops
            - EventNotifier
            - Value
            - DataTypeId
            - BaseDataType
            - ValueRank
            - ArrayDimensions
            - AccessLevel
            - UserAccessLevel
            - MinSamplingInterval
            - Historizing
            - Executable
            - UserExecutable
            - DataTypeDefinition
            - RolePermissions
            - UserRolePermissions
            - AccessRestrictions
            - AccessLevelEx
    httpuaserverBrowseNode:
      type: object
      required:
      - BrowseName
      - DisplayName
      - NodeClass
      - NodeId
      properties:
        BrowseName:
          type: string
        DisplayName:
          type: string
        HasChildren:
          type: boolean
        IconType:
          type: string
        NodeClass:
          type: string
          enum:
          - Object
          - Variable
          - Method
          - ObjectType
          - VariableType
          - ReferenceType
          - DataType
          - View
        NodeId:
          type: string
      additionalProperties:
        type: string
      description: 'Browse result node. If `AdditionalAttributes` were requested,
        the response object will contain additional members where: - the key is the
        requested attribute name - the value is a string representation of the attribute
        value The returned string value must be decoded according to the corresponding
        OPC UA attribute type.

        '
    httpuaserverBrowseResponse:
      type: array
      description: 'Nested browse response.

        Each top-level array entry corresponds to one requested NodeId. Each nested
        array contains the browse results for that NodeId.

        '
      items:
        type: array
        items:
          $ref: '#/components/schemas/httpuaserverBrowseNode'
    httpuaserverReadRequest:
