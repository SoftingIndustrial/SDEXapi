                  type: boolean
                  description: "Set to true if the edit session is to start with uploading\
                    \ a nodeset XML file and then continue from there, \nand false\
                    \ if the editing session is to start from the current content\
                    \ of the address space, or from empty if *addrSpaceId* is empty.\n"
