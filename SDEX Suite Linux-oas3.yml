        NodeIds:
          type: array
          description: List of node IDs to read.
          items:
            type: string
        AttributesToRead:
          type: array
          description: 'List of attributes to read from each node. Supported attributes
            are: NodeId, NodeClass, BrowseName, DisplayName, Description, WriteMask,
            UserWriteMask, IsAbstract, Symmetric, InverseName, ContainsNoLoops, EventNotifier,
            Value, DataTypeId, BaseDataType, ValueRank, ArrayDimensions, AccessLevel,
            UserAccessLevel, MinSamplingInterval, Historizing, Executable, UserExecutable,
            DataTypeDefinition, RolePermissions, UserRolePermissions, AccessRestrictions,
            AccessLevelEx.

            '
          items:
            type: string
            enum:
            - NodeId
            - NodeClass
            - BrowseName
            - DisplayName
            - Description
            - WriteMask
            - UserWriteMask
            - IsAbstract
            - Symmetric
            - InverseName
            - ContainsNoLoops
            - EventNotifier
            - Value
            - DataTypeId
            - BaseDataType
            - ValueRank
            - ArrayDimensions
            - AccessLevel
            - UserAccessLevel
            - MinSamplingInterval
            - Historizing
            - Executable
            - UserExecutable
            - DataTypeDefinition
            - RolePermissions
            - UserRolePermissions
            - AccessRestrictions
            - AccessLevelEx
    httpuaserverReadAttribute:
      type: object
      required:
      - StatusCode
      - Value
      properties:
        StatusCode:
          type: string
          description: Status code returned for the attribute read operation.
        Value:
          type: string
          description: String representation of the attribute value.
    httpuaserverReadNode:
      type: object
