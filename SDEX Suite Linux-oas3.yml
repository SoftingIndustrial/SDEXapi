  /runtime/uacore/sights/nodes-filter/{sessionId}/nodes-edit:
    post:
      tags:
      - Uacore_Sights_Node_Filter_Definition
      summary: Edit node filter mask
      description: 'Updates service-based filter mask for a node.

        Bitmask: - Browse: 0x01 - Read: 0x02 - Write: 0x04 - Method call: 0x08 - Subscribe:
        0x10 - UI reserved: 0x1000

        '
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - nodeId
              - checked
              - applyToSubtree
              properties:
                nodeId:
                  type: string
                checked:
                  type: integer
                  format: int32
                  description: 'Bitmask defining allowed services for a node.


                    Values:

                    - 1    = Browse

                    - 2    = Read

                    - 4    = Write

                    - 8    = Method call

                    - 16   = Subscribe

                    - 4096 = UI reserved


                    When the corresponding bit is set, the service is allowed on that
                    node.

                    The UI reserved flag has no functional meaning and is only used
                    for UI logic.

                    '
                  example: 1
                  enum:
                  - 1
                  - 2
                  - 4
                  - 8
                  - 16
                  - 4096
                applyToSubtree:
                  type: boolean
        required: true
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '400':
