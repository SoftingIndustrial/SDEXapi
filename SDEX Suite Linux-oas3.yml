      summary: Get subscriptions and monitored items merging configuration
      description: 'Gets the core Subscriptions and Monitored Items options that define
        whether monitored items are merged under compatible subscription settings.

        '
      responses:
        '200':
          description: Successful response with merging configuration.
          content:
            application/json:
              schema:
                type: object
                required:
                - merging
                properties:
                  merging:
                    type: boolean
                    description: "Defines whether subscriptions and monitored items\
                      \ are merged.\n\nfalse:\n  Subscriptions and monitored items\
                      \ are never merged,\n  and the relation between them is preserved.\n\
                      \ntrue:\n  Monitored items are merged when the following properties\
                      \ match:\n  - Node ID\n  - Attribute\n  - Sampling interval\n\
                      \  - Queue size\n  - Discard oldest flag\n  - Publishing interval\
                      \ of the subscription\n"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
