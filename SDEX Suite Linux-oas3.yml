                      is the key and the value is an array of uris the companion specification
                      depends on.
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    example:
                      http://www.softing.com/Example:
                      - http://opcfoundation.org/UA/MDIS
                      - http://opcfoundation.org/UA/
                      http://opcfoundation.org/UA/MDIS:
                      - http://opcfoundation.org/UA/
                      http://opcfoundation.org/UA/: []
                  details:
                    type: object
                    additionalProperties:
                      allOf:
                      - type: object
                        required:
                        - name
                        - id
                        - status
                        properties:
                          name:
                            type: string
                          id:
                            type: string
                          status:
                            type: string
                            enum:
                            - missing
                            - invalid
                            - ok
                            description: "*status* might have one of the following\
                              \ string values:\n- *missing* - a nodeset corresponding\
                              \ to the *<comp_specs_uri>* is NOT present \n- *invalid*\
                              \ - a nodeset corresponding to the *<comp_specs_uri>*\
                              \ is present BUT is unusable (should be replaced to\
                              \ fix it)\n- *ok* a nodeset corresponding to the *<comp_specs_uri>*\
                              \ is present and usable\n"
                      - $ref: '#/components/schemas/Model_properties'
