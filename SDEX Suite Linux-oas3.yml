        requiredModels:
          type: array
          items:
            $ref: '#/components/schemas/Model_properties'
    StateProperty:
      type: object
      properties:
        state:
          type: string
          description: 'Possible values for *state*:

            - *off* - the mapped address space is disabled or the module is disabled;

            - *failed* - the mapped address space failed to come up (so, it is unavailable,
            athough it is enabled);

            - *good* - the mapped address space is up and with no issues;

            - *warning* - the mapped address space is up, but there were warnings;

            - *loading* - address space loading is in progress.

            - *missing* - address space cannot be loaded because one or more missing
            dependencies

            '
          enum:
          - 'off'
          - failed
          - good
          - warning
          - loading
          - missing
    ValueAttribute:
      description: "Can be one of the following:\n- null value is represented as JSON\
        \ null\n- booleans, integers, floating point numbers, and strings are represented\
        \ as their corresponding JSON equivalents\n- DateTime is represented as ISO8601\
        \ string, e.g. *\"2024-06-21T11:49:23.456Z\"*\n- ByteString is represented\
        \ as a list of integers\n- NodeId and QualifiedName are represented as strings,\
        \ e.g. *\"ns=7;s=SomeNode\"* or *\"42:TheAnswer\"*\n- LocalizedText is represented\
        \ as a JSON list of JSON objects with *locale* and *text* fields\n- for types\
        \ derived from simple built-in types, the value is represented as the built-in\
        \ type; for example, the value shall never be Duration (i=290) but rather\
        \ Double (i=11)\n- for types derived from Structure:\n  - the value will be\
        \ a JSON Object with field names as defined in the structure and with the\
        \ values being the values of the fields\n  - for missing UA fields, the corresponding\
        \ JSON fields will be null or missing\n  - if a field value can use sub-types,\
        \ then the value shall be a JSON object of the form *{\"dataType\" : \"string-node-id\"\
        , \"value\" : json-value}*; otherwise, the value of the field is directly\
        \ the representation\n- for types derived from Enumeration, the value is directly\
        \ the integer representation of that value\n- for one or two-dimensional arrays,\
        \ it shall be a JSON list of JSON values as above, or a JSON list of JSON\
        \ lists of objects as above\n"
      oneOf:
      - type: object
      - type: array
        items:
          $ref: '#/components/schemas/ValueAttribute'
      - type: string
      - type: integer
      - type: number
      - type: boolean
    FullValueAttribute:
      type: object
