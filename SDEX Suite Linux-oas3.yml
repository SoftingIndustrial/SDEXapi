components:
  schemas:
    ResponseOthers:
      type: object
      properties:
        message:
          type: string
        link:
          type: string
    coreIdModel:
      type: object
      required:
      - id
      properties:
        id:
          type: string
    coreNameModel:
      type: object
      required:
      - name
      properties:
        name:
          type: string
    corePasswordModel:
      type: object
      required:
      - password
      properties:
        password:
          type: string
    coreUserModel:
      allOf:
      - $ref: '#/components/schemas/coreNameModel'
      - type: object
        required:
        - description
        - userType
        - id
        properties:
          id:
            type: string
          description:
            type: string
          userType:
            type: string
            enum:
            - Internal
            - External
    coreUserBodyModel:
      type: object
      required:
      - firstName
      - lastName
      - description
      - userType
      - organization
      - department
      - location
      - state
      - countryCode
      - phone
      - email
      - extra1
      - extra2
      properties:
        firstName:
          type: string
        lastName:
          type: string
        description:
          type: string
        userType:
          type: string
          enum:
          - Internal
          - External
        organization:
          type: string
        department:
          type: string
        location:
          type: string
        state:
          type: string
        countryCode:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        extra1:
          type: string
        extra2:
          type: string
    coreUserDescription:
      type: object
      required:
      - description
      properties:
        description:
          type: string
    corePkiSessionModel:
      type: object
      required:
      - pkiSessionId
      properties:
        pkiSessionId:
          type: string
    coreUsers:
      allOf:
      - $ref: '#/components/schemas/coreUserModel'
      - type: object
        required:
        - certificatesStatus
        - outgoingCertActive
        - groups
        properties:
          certificatesStatus:
            type: string
            enum:
            - Expired
            - AboutToExpire
            - Good
            - Missing
            description: "Expired - at least one of the user\u2019s certificate is\
              \ expired; AboutToExpire - at least one user certificate will expire\
              \ in less than 90 days; Good - all user\u2019s certificate do have this\
              \ state."
          outgoingCertActive:
            type: boolean
          groups:
            type: string
    coreUserToCreate:
      allOf:
      - $ref: '#/components/schemas/coreNameModel'
      - $ref: '#/components/schemas/corePasswordModel'
      - $ref: '#/components/schemas/coreUserBodyModel'
      - $ref: '#/components/schemas/corePkiSessionModel'
    coreUserToRetrieve:
      allOf:
      - $ref: '#/components/schemas/coreNameModel'
      - $ref: '#/components/schemas/coreUserBodyModel'
    coreUserToModify:
      allOf:
      - $ref: '#/components/schemas/corePasswordModel'
      - $ref: '#/components/schemas/coreUserBodyModel'
      - $ref: '#/components/schemas/corePkiSessionModel'
    coreUserPartOfGroupsToRetrieve:
      type: array
      items:
        $ref: '#/components/schemas/coreNameModel'
    coreUserPartOfGroupsToModify:
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/coreNameModel'
        - type: object
          required:
          - assign
          properties:
            assign:
              type: boolean
    coreUserContextToRetrieve:
      type: array
      items:
        required:
        - context-type
        - name
        properties:
          context-type:
            type: string
            example: OPC UA Client Connections
          name:
            type: array
            example:
            - Connection A
            - Connection B
            - Connection C
            items:
              type: string
    coreGroupsToRetrieve:
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/coreNameModel'
    coreGroupToCreate:
      type: object
      required:
      - groupName
      properties:
        groupName:
          type: string
    coreUsersFromGroupToRetrieve:
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/coreNameModel'
    coreUserAddedToGroup:
      allOf:
      - $ref: '#/components/schemas/coreIdModel'
    coreFileModel:
      type: string
      format: binary
    coreNameValueModel:
      allOf:
      - $ref: '#/components/schemas/coreNameModel'
      - type: object
        required:
        - value
        properties:
          value:
            type: string
    coreEditUserCertificateRequest:
      type: object
      required:
      - user
      properties:
