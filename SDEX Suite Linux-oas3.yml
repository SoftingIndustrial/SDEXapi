              schema:
                $ref: '#/components/schemas/ResponseOthers'
components:
  schemas:
    ResponseOthers:
      type: object
      properties:
        message:
          type: string
        link:
          type: string
    coreIdModel:
      type: object
      required:
      - id
      properties:
        id:
          type: string
    coreNameModel:
      type: object
      required:
      - name
      properties:
        name:
          type: string
    corePasswordModel:
      type: object
      required:
      - password
      properties:
        password:
          type: string
    coreUserModel:
      allOf:
      - $ref: '#/components/schemas/coreNameModel'
      - type: object
        required:
        - description
        - userType
        - id
        properties:
          id:
            type: string
          description:
            type: string
          userType:
            type: string
            enum:
            - Internal
            - External
    coreUserBodyModel:
      type: object
      required:
      - firstName
