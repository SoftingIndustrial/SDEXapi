  /runtime/uacore/subscriptions-merging:
    get:
      tags:
      - Uacore_Subscriptions_And_Monitored_Items_Options
      description: Gets the core Subscriptions and Monitored Items options.
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                type: object
                required:
                - merging
                properties:
                  merging:
                    type: boolean
                    description: The merging parameter can have the following values
                      false - subscriptions and monitored items are never merged and
                      the relation of subscriptions to monitored items is preserved;
                      true - monitored items are merged if node ID, attribute, sampling
                      interval, queue size, discard oldest, and the publishing interval
                      of the subscription are the same.
                    enum:
                    - true
                    - false
  /runtime/uacore/subscriptions:
    post:
      tags:
      - Uacore_Subscriptions_And_Monitored_Items_Options
      description: Sets the core Subscriptions and Monitored Items options. If called
        while in running mode, changing the merging parameter will trigger a restart
        (going to halted and back to running mode).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - merging
              properties:
                merging:
                  type: boolean
                  description: The merging parameter can have the following values
                    false - subscriptions and monitored items are never merged and
                    the relation of subscriptions to monitored items is preserved;
                    true - monitored items are merged if node ID, attribute, sampling
                    interval, queue size, discard oldest, and the publishing interval
                    of the subscription are the same.
                  enum:
                  - true
                  - false
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
