      - nodeId
      properties:
        nodeId:
          type: string
          description: Node identifier.
      additionalProperties:
        $ref: '#/components/schemas/httpuaserverReadAttribute'
      description: 'Read result object for a node. Each requested attribute appears
        dynamically as a property name. Each attribute contains: - StatusCode - Value

        If the node does not exist or is not visible in the session, only the nodeId
        member is returned.

        '
    httpuaserverReadResponse:
      type: array
      description: List of read results for each requested node.
      items:
        $ref: '#/components/schemas/httpuaserverReadNode'
    MAS_basic_properties:
