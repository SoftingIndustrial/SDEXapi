        nodeset. In order for these commands to work, creation of <configuration base>\\\
        core\\nodeset folder is mandatory. Xml files will be imported only on start\
        \ time or on restart; during upload the content just xml basic validation\
        \ is applied. In case of duplicate nodes found on import, the operation fails\
        \ but the node id is specifed in error logs. Max file size is 10MB (with corresponding\
        \ nginx config -> \u201Cclient_max_body_size 10M; \u201C in http section."
      parameters:
