    coreCertificateDetails:
      type: object
      required:
      - description
      - serialNumber
      - validFrom
      - validTo
      - thumbprint
      - validityStatus
      - private-key-available
      - is-default-outgoing
      - subject
      - issuer
      - subjectAlternativeName
      - keyUsages
      properties:
        description:
          type: string
        serialNumber:
          type: string
        validFrom:
          type: string
        validTo:
          type: string
        thumbprint:
          type: string
        validityStatus:
          type: string
          description: The possible values for "validityStatus" are "Good", "AboutToExpire"
            (will expire in less than 90 days from now) , "Expired" (already expired)
        private-key-available:
          type: boolean
        is-default-outgoing:
          type: boolean
          description: "At most one certificate shall have \u201Eis-default-outgoing\u201C\
            \ on true. That certificate shall also have \u201Eprivate-key-available\u201C\
            \ = true."
        subject:
          type: array
          description: Each "name" part in "subjectDN" and "issuerDN" may be "C" =country,
            "S" = state/county, "L" = locality (city), "O" =organization, "OU" = organization
            unit (department), etc. Some information is duplicate, because of historical
            reasons (e.g, "subjectName" is the same as "CN" under "subjectDN")
          items:
            allOf:
            - $ref: '#/components/schemas/coreNameValueModel'
        issuer:
          type: array
          items:
            allOf:
            - $ref: '#/components/schemas/coreNameValueModel'
        subjectAlternativeName:
          type: array
          description: Each "name" part in "subjectAlternateName" may be "URL", "DNS",
            etc
          items:
            allOf:
            - $ref: '#/components/schemas/coreNameValueModel'
        keyUsages:
          type: array
          items:
            type: string
