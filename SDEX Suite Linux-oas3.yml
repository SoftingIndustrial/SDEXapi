  /runtime/mappedaddressspace/edit-session/{session-id}/types/{node-id}/instance-declarations:
    parameters:
    - name: session-id
      in: path
      required: true
      schema:
        type: string
    - name: node-id
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - MappedAddressSpace_Edit_Session
      description: 'Returns the fully inherited instance declaration hierarchy for
        the object type or variable type specified by the node ID.


        See [UA specs part 3 section 6.2](https://reference.opcfoundation.org/Core/Part3/v105/docs/6.2)
        [UA specs part 3 section 6.3.3](https://reference.opcfoundation.org/Core/Part3/v105/docs/6.3.3).


        In particular, note that, as per [6.2.6](https://reference.opcfoundation.org/Core/Part3/v105/docs/6.2.6),
        `any InstanceDeclaration within the InstanceDeclarationHierarchy can be uniquely
        identified by a sequence of BrowseNames`.


        This call returns all instance declaration nodes referenced directly or indirectly
        through forward HierarchicalReferences from the type node and its ancestors,
        except those from ancestor types that are overriden by some descendent type.

        '
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                  - type: object
                    required:
                    - browsePaths
                    - attributes
                    - modellingRule
                    - references
                    properties:
                      browsePaths:
                        description: Contains all the distinct sequences of browseNames
                          that lead from the type definition node to the current node
                          via hierarchical references.
                        type: array
                        items:
                          type: array
                          items:
                            type: string
                      attributes:
                        allOf:
                        - $ref: '#/components/schemas/NodeBasicAttriibutes'
                        - type: object
                          required:
                          - description
                          properties:
                            description:
                              $ref: '#/components/schemas/LocalizedText'
                            eventNotifier:
                              description: For object node class.
                              type: integer
                            writeMask:
                              type: integer
                            historizing:
                              type: boolean
                            isAbstract:
                              description: For data type, object type and reference
                                type node class.
                              type: boolean
                            dataTypeDescription:
                              description: For data type node class
                              allOf:
                              - $ref: '#/components/schemas/DataTypeDescription'
                            executable:
                              description: For method node class.
                              type: boolean
                            symmetric:
                              description: For reference type node class.
                              type: boolean
                            inverseName:
                              description: For reference type node class.
                              allOf:
                              - $ref: '#/components/schemas/LocalizedText'
                            arrayDimensions:
                              description: For variable node class.
                              type: array
                              items:
                                type: integer
                        - $ref: '#/components/schemas/VariableAttributes'
                      modellingRule:
                        type: string
                        enum:
                        - Mandatory
                        - Optional
                        - MandatoryPlaceholder
                        - OptionalPlaceholder
                      references:
                        type: array
                        description: 'Contains all the references linking the current
                          instance declaration with other instance declarations returned
                          in the same list. Note that this list of references will
                          **not** contain *HasSubtype*, *HasTypeDefinition*, or *HasModellingRule*.

                          '
                        items:
                          type: object
                          required:
                          - target
                          - referenceType
                          - isInverse
                          properties:
                            target:
                              type: string
                            referenceType:
                              type: string
                            isInverse:
                              type: boolean
                  - $ref: '#/components/schemas/NodeOptionalAtributes'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '404':
          description: Edit session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '500':
          description: Internal server error.
          content:
