              properties:
                merging:
                  type: boolean
                  description: "Defines whether subscriptions and monitored items\
                    \ are merged.\nfalse:\n  Subscriptions and monitored items are\
                    \ never merged,\n  and their relationship is preserved.\n\ntrue:\n\
                    \  Monitored items are merged when compatible based on:\n  - Node\
