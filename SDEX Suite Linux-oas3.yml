  /runtime/uacore/sights/nodes-filter/{session-GUID}/nodes-edit:
    post:
      tags:
      - Uacore_Sights_Node_Filter_Definition
      description: "Updated a node\u2019s current service based filter mask definition\
        \ (see details on the checked parameter below). The node will be recursively\
        \ browsed on the corresponding source and the add/remove action will be applied\
        \ to the node itself together with all the nodes in the sub-hierarchy discovered\
        \ by hierarchical references.Depending on the value of \u201CapplyToSubtree\u201D\
        \ parameter, the action will be appied to the node only, or to the entire\
        \ subtree."
      parameters:
      - name: session-GUID
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - nodeId
              - checked
              - applyToSubtree
              properties:
                nodeId:
                  type: string
                checked:
                  type: string
                  description: When the checked bit mask corresponding for a service
                    is set on a node the service call execution is allowed on that
                    node.*Special bit flag without any functional meaning, shall be
                    reserved for UI logic as it allows to store an additional state
                    used, for display purposes, to inform the user if any filters
                    are set in a node's subtree.
                  format: binary
                  example: '0x01'
                  enum:
                  - Browse: '0x01'
                  - Read: '0x02'
                  - Write: '0x04'
                  - Method call: '0x08'
                  - Subscribe: '0x10'
                  - UI reserved*: '0x1000'
                applyToSubtree:
                  type: boolean
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/uacore/sights/nodes-filter/{session-GUID}/nodes-status:
