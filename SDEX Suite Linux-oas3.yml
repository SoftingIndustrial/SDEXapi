      in: path
      required: true
      schema:
        type: string
    - name: node-id
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - MappedAddressSpace_Edit_Session
      description: Returns the data (UA attributes, UA references, plus some other
        useful information) on the specified node.
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                type: object
                required:
                - attributes
                - hasChildren
                - forwardedTo
                allOf:
                - type: object
                  properties:
                    attributes:
                      description: 'The attributes that are not defined for the node
                        class will be missing entirely; same for *typeDefinition*.

                        '
                      allOf:
                      - $ref: '#/components/schemas/NodeBasicAttriibutes'
                      - type: object
                        required:
                        - description
                        properties:
                          description:
                            $ref: '#/components/schemas/LocalizedText'
                          eventNotifier:
                            description: For object node class.
                            type: integer
                          writeMask:
                            type: integer
                          historizing:
                            type: boolean
                          isAbstract:
                            description: For data type, object type and reference
                              type node class.
                            type: boolean
                          dataTypeDescription:
                            description: For data type node class.
                            allOf:
                            - $ref: '#/components/schemas/DataTypeDescription'
                          executable:
                            description: For method node class.
                            type: boolean
                          symmetric:
                            description: For reference type node class.
                            type: boolean
                          inverseName:
                            description: For reference type node class.
                            allOf:
                            - $ref: '#/components/schemas/LocalizedText'
                          arrayDimensions:
                            description: For variable node class.
                            type: array
                            items:
                              type: integer
                      - $ref: '#/components/schemas/VariableAttributes'
                - $ref: '#/components/schemas/NodeOptionalAtributes'
                - type: object
                  properties:
                    attributesFromTypeDefinitionJsonName:
                      description: 'Will be missing for nodes outside the address
                        space under edit, and the attributes below are present only
                        for nodes of class *Variable*.

                        '
                      type: object
                      properties:
                        dataType:
                          type: string
                        valueRank:
                          type: integer
                        arrayDimensions:
                          description: will be null if *valueRank* does not indicate
                            a precise number of dimensions (i.e., if *valueRank* is
                            not 0 or a strictly positive value).
                          type: array
                          items:
                            type: integer
                    modellingRule:
                      type: string
                      enum:
                      - Mandatory
                      - Optional
                      - MandatoryPlaceholder
                      - OptionalPlaceholder
                    hasChildren:
                      type: boolean
                    forwardedTo:
                      allOf:
                      - $ref: '#/components/schemas/ForwardedElement'
                      - $ref: '#/components/schemas/Incompatibilities'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '404':
          description: Edit session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        406:
          description: Not Acceptable. Default user password was not changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    put:
      tags:
      - MappedAddressSpace_Edit_Session
      description: "Updates UA attributes and other few associated information for\
        \ the specified node.\n\nNotes:\n  - node ID and node class cannot be updated\n\
        \  - browse name can be updated only for a stand-alone instance, not for one\
        \ that is a component in a larger one\n  - attributes not specified in the\
        \ request will keep their current values  \n  - when setting the forwarding\
        \ target node ID (for the node itself and, in case of Methods, for the parent\
        \ object), one and only one of the *namespaceIndex* or *namespaceUri* shall\
        \ be present.\n  - clearing the forwarding information should be made by sending\
        \ as a value for *forwardedTo* / *nodeForwardedTo* the representation of nodeId_NULL:\n\
        \    ```json\n    // one and only one of the *namespaceIndex* or *namespaceUri`\
        \ should be present\n    {\n        \"namespaceIndex\": 0,\n        // \"\
        namespaceUri\": \"http://opcfoundation.org/UA/\",\n        \"identifierType\"\
        : \"i\",\n        \"identifier\": \"0\"\n    }\n    ```\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attributes:
                  allOf:
                  - type: object
                    properties:
                      browseName:
                        type: string
                      displayName:
                        $ref: '#/components/schemas/LocalizedText'
                      description:
                        $ref: '#/components/schemas/LocalizedText'
                      executable:
                        type: boolean
                  - $ref: '#/components/schemas/VariableAttributes'
                forwardedTo:
                  $ref: '#/components/schemas/ForwardedElement'
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  forwardedTo:
                    $ref: '#/components/schemas/Incompatibilities'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '404':
          description: Edit session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        406:
          description: Not Acceptable. Default user password was not changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    delete:
      tags:
      - MappedAddressSpace_Edit_Session
      description: Deletes the UA node. Mandatory components of another node cannot
        be deleted.
      responses:
        '200':
          description: OK success.
