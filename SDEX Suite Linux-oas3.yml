          application/json:
            schema:
              $ref: '#/components/schemas/httpuaserverBrowseRequest'
            example:
              SessionName: session-type-name
              AdditionalAttributes:
              - Description
              - Value
              NodeIds:
              - ns=1;i=123
              - ns=2;s=somestring
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/httpuaserverBrowseResponse'
              example:
              - - DisplayName: DisplayName1
                  BrowseName: BrowseName1
                  NodeClass: Object
                  NodeId: ns=1;i=123
                  Description: Example object
                - DisplayName: DisplayName2
                  BrowseName: BrowseName2
                  NodeClass: Variable
                  NodeId: ns=3;s=somestring
                  Value: '123'
              - - DisplayName: AnotherNode
                  BrowseName: AnotherBrowseName
                  NodeClass: Method
                  NodeId: ns=2;i=500
        '400':
          description: Bad Request.
          content:
            application/json:
