  /runtime/mappedaddressspace/edit-session/{session-id}/read:
    post:
      tags:
      - MappedAddressSpace_Edit_Session
      description: 'Perform a read operation on the list nodes that are part current
        of edit session.


        Returns a list of objects for each node with the status code and the values
        for the specified attributes.

        If the nodeId does not exists or it is not visible in the edit session, the
        return object element will be just the nodeId.

        '
      parameters:
      - name: session-id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - NodeIds
              - AttributesToRead
              properties:
                NodeIds:
                  type: array
                  items:
                    type: string
                AttributesToRead:
                  type: array
                  items:
                    type: string
                    enum:
                    - NodeId
                    - NodeClass
                    - BrowseName
                    - DisplayName
                    - Description
                    - WriteMask
                    - UserWriteMask
                    - IsAbstract
                    - Symmetric
                    - InverseName
                    - ContainsNoLoops
                    - EventNotifier
                    - Value
                    - DataTypeId
                    - BaseDataType
                    - ValueRank
                    - ArrayDimensions
                    - AccessLevel
                    - UserAccessLevel
                    - MinSamplingInterval
                    - Historizing
                    - Executable
                    - UserExecutable
                    - DataTypeDefinition
                    - RolePermissions
                    - UserRolePermissions
                    - AccessRestrictions
                    - AccessLevelEx
            example:
              NodeIds:
              - ns=1;i=123
              - ns=2;s=somestring
              AttributesToRead:
              - IsAbstract
              - ValueRank
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - nodeId
                  properties:
                    nodeId:
                      type: string
                  additionalProperties:
                    type: object
                    required:
                    - StatusCode
                    - Value
                    properties:
                      StatusCode:
                        type: string
                      Value:
                        $ref: '#/components/schemas/ValueAttribute'
                example:
                - nodeId: ns=1;i=123
                  IsAbstract:
                    StatusCode: '0'
                    Value: 'true'
                  ValueRank:
                    StatusCode: '0'
                    Value: '0'
                - nodeId: ns=2;s=somestring
                  IsAbstract:
                    StatusCode: '0'
                    Value: 'false'
                  ValueRank:
                    StatusCode: '0'
                    Value: '0'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '404':
          description: Edit session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        406:
          description: Not Acceptable. Default user password was not changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/mappedaddressspace/edit-session/{session-id}/create-instance:
    parameters:
    - name: session-id
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - MappedAddressSpace_Edit_Session
      description: Creates a new node, together with all Mandatory (but not MandatoryPlaceholder)
        sub-nodes required by its type definition.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - instanceName
              - parentNodeId
              - parentReference
              properties:
                instanceName:
                  type: string
                parentNodeId:
                  type: string
                parentReference:
                  type: string
                  description: The node id representing the reference to the parent.
                typeDefinition:
                  type: string
                  description: The node id of the type definition node. Can be missing
                    only for method nodes.
                nodeClass:
                  type: string
                  description: If missing it will take the node class of the found
                    root type definition node.
                  enum:
                  - Object
                  - Variable
                  - Method
                browseName:
                  type: string
                  description: 'If missing the default value will be *instanceName*
                    name and current namespace index of the edit session.

                    '
                displayName:
                  description: 'If missing the default value will be *instanceName*
                    text and "" locale.

                    '
                  allOf:
                  - $ref: '#/components/schemas/LocalizedText'
                description:
                  description: If missing it will take the description of the found
                    root type definition node.
                  allOf:
                  - $ref: '#/components/schemas/LocalizedText'
                dataType:
                  type: string
                  description: This is for *variable* nodes. If missing it will take
                    the data type of the found root type definition node.
                valueRank:
                  type: integer
                  description: This is for *variable* nodes. If missing it will take
                    the value rank of the found root type definition node.
                value:
                  description: This is for *variable* nodes. If missing it will take
                    the value of the found root type definition node.
                  allOf:
                  - $ref: '#/components/schemas/ValueAttribute'
                accessLevel:
                  type: integer
                  description: "This is for *variable* nodes. \nIf missing it will\
                    \ take the access value of the found root type definition node\
                    \ and if that is missing it will be 3 (read & write).\n"
                minimumSamplingInterval:
                  type: number
                  description: "This is for *variable* nodes. \nIf missing it will\
                    \ take the minimum samplimg interval of the found root type definition\
                    \ node and if that is missing it will be -1.0.\n"
                executable:
                  type: boolean
                  description: This is for *method* nodes. If missing it will take
                    the data type of the found root type definition node.
      responses:
        '200':
          description: OK success.
          content:
            application/json:
              schema:
                type: object
                description: The node ID of the new node.
                required:
                - nodeId
                properties:
                  nodeId:
                    type: string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '404':
          description: Edit session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        406:
          description: Not Acceptable. Default user password was not changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/mappedaddressspace/edit-session/{session-id}/nodes/{node-id}:
    parameters:
