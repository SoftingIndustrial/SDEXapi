    mqttSubscribeGet:
      type: object
      required:
      - addressSpace
      - connectionName
      - enabled
      - mqttQoS
      - payloadDefinition
      - payloadFormat
      - requestName
      - topicName
      properties:
        addressSpace:
          type: string
          description: The "addressSpace" field is only stored by the Mqtt module
            and it is not validated or used in any way.The caller is responsible to
            manage the session type to address space mapping(see runtime/uacore/sights/conn-filtering/sessions-mapping).The
            session type for a publish request is the name of the publish request,
            prefixed by "MqttSubscriber\_".
        connectionName:
          type: string
        enabled:
          type: boolean
        mqttQoS:
          type: string
          enum:
          - Level0_AtMostOnce
          - Level1_AtLeastOnce
          - Level2_ExactlyOnce
        payloadDefinition:
          type: array
          items:
            type: object
            required:
            - path
            - destinations
            - displayNameElements
            properties:
              path:
                type: array
                items:
                  anyOf:
                  - type: string
                  - type: integer
              destinations:
                type: array
                items:
                  type: object
                  required:
                  - sourceData
                  properties:
                    sourceData:
                      type: string
                      enum:
                      - json-value
                      - nothing
                    nodeId:
                      type: string
                      description: The fields "nodeId" and "displayPath" are semantically
                        mutually exclusive.Use "nodeId" for the case a destination
                        is fully specified by its nodeId.Use "displayPath" for the
                        case a destination is specified by its displayPath (with placeholders).
                    displayPath:
                      allOf:
                      - $ref: '#/components/schemas/variableDisplayPath'
                    attributeId:
                      type: string
                      enum:
                      - Value
                    placeholder:
                      type: string
                      description: The "placeholder" member is a string in which the
                        caller can serialize any useful information linked to the
                        current destination. It will be just stored by the Mqtt module
                        and it is not validated, nor used, in any way.
        payloadFormat:
          type: string
        requestName:
          type: string
        topicName:
          type: string
    subscribeRequestIdModel:
      type: object
      required:
      - requestId
      properties:
        requestId:
          type: string
          description: The "requestId" member is a generated unique id (GUID). It
            is used as a key to reference the Subscribe Request in a Publish Request
            triggered by MQTT definition ("dataRowTrigger"="mqttTriggered")
    mqttSubscribeRequestBodyModel:
      type: object
      required:
      - connectionName
      - requestName
      - enabled
      - topicName
      - addressSpace
      - mqttQoS
      - payloadDefinition
      properties:
        connectionName:
          type: string
        requestName:
          type: string
        enabled:
          type: boolean
        topicName:
          type: string
        addressSpace:
          type: string
        mqttQoS:
          type: string
        payloadDefinition:
          type: array
          items:
            type: object
            required:
            - path
            - destinations
            - displayNameElements
            properties:
              path:
                type: array
                items:
                  anyOf:
                  - type: string
                  - type: integer
              destinations:
                type: array
                items:
                  type: object
                  required:
                  - sourceData
                  properties:
                    sourceData:
                      type: string
                      enum:
                      - json-value
                      - nothing
                    nodeId:
                      type: string
                      description: The fields "nodeId" and "displayPath" are semantically
                        mutually exclusive.Use "nodeId" for the case a destination
                        is fully specified by its nodeId.Use "displayPath" for the
                        case a destination is specified by its displayPath (with placeholders).
                    displayPath:
                      allOf:
                      - $ref: '#/components/schemas/variableDisplayPath'
                    attributeId:
                      type: string
                      enum:
                      - Value
                    placeholder:
                      type: string
                      description: The "placeholder" member is a string in which the
                        caller can serialize any useful information linked to the
                        current destination. It will be just stored by the Mqtt module
                        and it is not validated, nor used, in any way.
    mqttSubscribeRequestToCreate:
      allOf:
      - $ref: '#/components/schemas/mqttSubscribeRequestBodyModel'
    mqttSubscribeRequests:
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/subscribeRequestIdModel'
        - $ref: '#/components/schemas/mqttSubscribeRequestBodyModel'
    mqttSubscribeRequestBrief:
      type: object
      required:
      - connectionName
      - requestName
      - enabled
      - topicName
      - mqttQoS
      properties:
        connectionName:
          type: string
        requestName:
          type: string
        enabled:
          type: boolean
        topicName:
          type: string
        mqttQoS:
          type: string
    mqttSubscribeRequestsBrief:
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/subscribeRequestIdModel'
        - $ref: '#/components/schemas/mqttSubscribeRequestBrief'
    mqttPublishRequest:
      type: object
      required:
      - requestName
      - enabled
      - topicName
      - addressSpace
      - mqttQoS
      - publishInterval
      - publishingMode
      - dataRowTrigger
      - samplingInterval
      - payloadFormat
      - template
      - placeholders
      properties:
        requestName:
          type: string
        enabled:
          type: boolean
        topicName:
          type: string
        addressSpace:
          type: string
          description: The "addressSpace" field is only stored by the Mqtt module
            and it is not validated or used in any way. The caller is responsible
            to manage the session type to address space mapping (see runtime/uacore/sights/conn-filtering/sessions-mapping).
            The session type for a publish request is the name of the publish request,
            prefixed by "MqttPublisher_".
        mqttQoS:
          type: string
          enum:
          - Level0_AtMostOnce
          - Level1_AtLeastOnce
          - Level2_ExactlyOnce
        publishInterval:
          type: integer
        publishingMode:
          type: string
          enum:
          - multipleSamples
          - singleSample
          - alarmMode
        dataRowTrigger:
          type: string
          enum:
          - samplingTimer
          - dataChange
          - conditionalSamplingTimer
          - conditionalTrigger
          - advancedTrigger
          - mqttTriggered
          description: samplingTimer (cannot be used with publishingMode = alarmMode);
            dataChange (this is the only acceptable one for publishingMode = alarmMode);
            conditionalSamplingTimer (cannot be used with publishingMode = alarmMode);
            conditionalTrigger (can be used only with  publishingMode = singleSample);
            advancedTrigger (can be used only with  publishingMode = singleSample);
            mqttTriggered (can be used only with  publishingMode = singleSample).
            For the case publisher is configured with dataRowTrigger=mqttTriggered
            the content of the previously described placeholders may have some particularities.
            Elements with the type=data could be defined with the display path instead
            of the node id. In this case, those entries wil be changed as follows
            "ancestors" member is not present and "nodeId" element is replaced by
            a new 'displayPath' member of type array.
        dataRowTimeout:
          type: integer
          description: The field "dataRowTimeout" only makes sense for "dataRowTrigger"=["conditionalTrigger"|"mqttTriggered"|"advancedTrigger"]
            and specifies the max time to wait for the read of the data in the payload
            to complete.
        mqttTriggerSubscriberId:
          type: string
          description: The field "mqttTriggerSubscriberId" only makes sense for "dataRowTrigger"="mqttTriggered"
            and specifies the id of the configured Mqtt Subscribe request to be used
            as a trigger for the current publisher
        samplingInterval:
          type: integer
          description: The field "samplingInterval" makes no sense for "publishingMode"
            other than "multipleSamples".
        payloadFormat:
          type: string
          enum:
          - json
          - text(not implemented yet)
          - xml(not implemented yet)
        template:
          type: string
          description: The field "template" contains the template for the publish
            message, with placeholders in the format "@name@".
          example: '{"topic":"@topic@", "timestamp":"@ts@", "data":{"pos":"@pos@",
            "motorRPM":"@motorRPM@"}}'
        placeholders:
          type: object
          description: The filed "placeholders" contains an array of objects defining
            each a variable node in the address space.
          properties:
            type:
              type: string
              enum:
              - topicName
              - clientId
              - timestamp
              - data
            displayName:
              type: string
              description: the 'key' of this placeholder; it is used as display name
                in the GUI; LUA script uses this key as an argument for the exposed
                LUA API for retrieving the value for the current variable node.
            script:
              type: string
              description: The filed "script" contains the code to be executed by
                LUA as a string
            timeZone:
              type: string
              enum:
              - utc
              - local
              description: for "type"="timestamp", a string with possible values "utc"
                and "local";
            nodeId:
              type: string
              description: a string containing the node ID of the variable node(e.g.,
                "nodeId":"ns=4;s=SomeNode"). For "type"="data", a string containing
                the node ID of the node whose value is to be replaced (e.g., "nodeId":"ns=4;s=SomeNode").
            ancestors:
              type: array
              description: for "type"="data", a list of strings representing the node
                IDs of the ancestors of the subscribed node. This is for GUI usage
                only; the backend will simply store and retrieve it back.
              items:
                type: string
            attributeId:
              type: string
              enum:
              - values(only this it is possible)
              - timestamp
              - quality
              - dataType
              description: a string containing the (pseudo-UA) attribute to be substituted
                here. For "type"="data", a string containing the (pseudo-UA) attribute
                to be substituted here. TBD fields describing the substitution rules
                for text and XML formats (how to deal with a missing value, arrays,
                etc)
            format:
              type: string
              enum:
              - defaultFormat
              - stringIsJson
              description: a string describing how the value is to be formatted in
                the publish message.
            displayPath:
              allOf:
              - $ref: '#/components/schemas/variableDisplayPath'
        triggerSource:
          type: object
          properties:
            nodeId:
              type: string
              description: The field "nodeId" of the "triggerSource" object  is a
                string containing the node ID of the variable to use as trigger (e.g.,
                "nodeId":"ns=4;s=SomeNode").
            attributeId:
              type: string
            samplingInterval:
              type: integer
              description: The field "samplingInterval" defines the sampling for the
                variable nodes involved in the logics of the advanced trigger (the
                placeholders below)
            uiData:
              nullable: true
              type: string
            addressSpace:
              type: string
              description: The field "addresSpace" defines the address space used
                to localize the variables nodes used in the trigger definition
            triggerValue:
              type: boolean
              description: The field "triggerValue" shall be used only for the trigger
                definition corresponding to "dataRowTrigger"="conditionalSamplingTimer".
            triggerEvent:
              type: string
              enum:
              - raising
              - falling
              - change
              description: The field "triggerEvent" shall be used only for the trigger
                definition corresponding to "dataRowTrigger"="conditionalTrigger".
            variableDetails:
              type: object
              properties:
                dataTypeNodeId:
                  type: string
                  description: The field "dataTypeNodeId" of the "triggerSource" object  is
                    a string containing the node ID of the dataType of the variable
                    to use as trigger (e.g. "ns=0;i=1", or simply "i=1").
                selectorPath:
                  type: array
                  description: The field "selectorPath" only exists if the trigger
                    logic is fired by a sub-element of the variable (an index in case
                    of array variable or a struct member in case of structured data
                    type).
                  items:
                    type: string
