    coreCertificateToCreate:
      type: object
      required:
      - description
      - password
      - country
      - state-or-province
      - organization
      - organization-unit
      - common-name
      - email
      - locality
      - valid-days
      properties:
        description:
          type: string
        password:
          type: string
          description: Password must be either empty (no password) or otherwise between
            4 and 1023 characters in length
        country:
          type: string
          description: Country must be either empty or a 2-characters ISO country
            code
        state-or-province:
          type: string
          description: State-or-provence and locality must be UTF-8 strings of at
            most 128 characters (code points are numbered)
        organization:
          type: string
          description: Organization, organization-unit, and common-name are UTF-8
            strings of at most 64 characters
        organization-unit:
          type: string
        common-name:
          type: string
        email:
          type: string
          description: Email must be a valid e-mail of at most 128 characters (no
            non-ASCII characters are allowed)
        locality:
          type: string
        valid-days:
          type: integer
          description: Valid-days must be between 0 and 24855 (2^31-1 seconds, or
            approximately 86 years)
