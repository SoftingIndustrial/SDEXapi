openapi: 3.0.0
info:
  title: SDEX Suite Linux API
  description: This is the Raven UaCore API.
  version: '3.01'
servers:
- url: '{protocol}://{environment}:{port}'
  description: SDEX Suite Linux
  variables:
    protocol:
      default: https
      enum:
      - http
      - https
    environment:
      enum:
      - localhost
    port:
      default: '1443'
      enum:
      - '8099'
      - '1443'
- url: '{protocol}://{environment}:{port}'
  description: uacore module
  variables:
    protocol:
      default: http
      enum:
      - http
      - https
    environment:
      default: 192.168.56.102
      enum:
      - 192.168.56.102
      - localhost
    port:
      default: '8099'
      enum:
      - '8099'
      - '1443'
security:
- AuthHeader: []
tags:
- name: Core_Application_Settings
- name: Core_Authentication
- name: Core_Audit_Log
- name: Core_Configuration_Download/Upload
- name: Core_Group_Management
- name: Core_Ldap_Auth_Management
- name: Core_License
- name: Core_Log_Files
- name: Core_System
- name: Core_Trace
- name: Core_User_Certificate_Management
- name: Core_User_Management
- name: Core_Version
- name: Core_Support_Data
- name: Uacore_Application_Identity
- name: Uacore_Namespaces_Management
- name: Uacore_NodeSetXml
- name: Uacore_Sights_Management
- name: Uacore_Sights_Node_Filter_Definition
- name: Uacore_Subscriptions_And_Monitored_Items_Options
paths:
  /runtime/core/auth/by-password:
    post:
      tags:
      - Core_Authentication
      description: Login by password.Only authenticated users are allowed to see and
        change the configuration of the DI server. The fastCGIServer validates with
        each request the user and it's rights. There are two authentication mechanisms,
        either of them can be used.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                password:
                  type: string
                  description: The name and password must be the credentials of a
                    user with appropriate access rights.
                clientNonce:
                  type: string
                  description: base64-string - The client nonce is a random byte sequence
                    (16 to 512 bytes, or 128 to 4096 bits).
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  serverNonce:
                    type: string
                    description: base64-string
                  expiryTime:
                    type: string
                    example: integer-seconds-since-1970
                    description: The expiry time is the time at which the authentication
                      expires if not refreshed, expressed as the number of seconds
                      since 1970-01-01T00:00:00Z.
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/auth/refresh-token:
    post:
      tags:
      - Core_Authentication
      description: Refreshing a token is possible only if not expired yet,passing
        a valid user and signature.
      parameters:
      - in: query
        name: UserAndSignature
        description: The user name and signature can be passed as query parameters.
        schema:
          type: string
          example: User=john%20doe&Signature=UjgyDTg2yTswMCuATEZbrRrKkdSA46zaTHXt6BO8aAg%3D
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                oldServerNonce:
                  type: string
                  example: base64-string
                  description: The old server nonce is requested as an additional
                    authentication check.
                newClientNonce:
                  type: string
                  example: base64-string
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: object
                properties:
                  newServerNonce:
                    type: string
                    description: base64-string - The new client and server nonces
                      are to be used starting at the next request.
                  expiryTime:
                    type: string
                    example: integer-seconds-since-1970
                    description: The expiry time is the time at which the authentication
                      expires if not refreshed, expressed as the number of seconds
                      since 1970-01-01T00:00:00Z.
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/auth/logout:
    post:
      tags:
      - Core_Authentication
      description: Logout is done by calling HTTP POST `runtime/core/auth/logout No
        input needs to be provided and no response is returned.
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/user/{user_name}/authentication-token:
    get:
      tags:
      - Core_Authentication
      description: Returns the authentication token which will be used to pass the
        logged on user information at each call. The token is time dependent and is
        different with each call and user name.
      parameters:
      - in: path
        name: user_name
        description: The user name of the user.
        schema:
          type: string
          example: admin
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: object
                properties:
                  authentication-token:
                    type: string
                    description: token-value
                  userId:
                    type: string
                    example: authenticated-user-id
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/trace:
    get:
      tags:
      - Core_Trace
      description: Get general trace settings.
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceToFile:
                    type: boolean
                  traceFileNumber:
                    type: integer
                  traceFileSize:
                    type: integer
                  traceMinFilesNumber:
                    type: integer
                  traceMaxFilesNumber:
                    type: integer
                  traceMinFileSize:
                    type: integer
                  traceMaxFileSize:
                    type: integer
                  traceToTCP:
                    type: boolean
                  traceTCPPort:
                    type: integer
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_Trace
      description: Change general trace settings. TCP related settings are not used
        for now.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                traceToFile:
                  type: boolean
                traceFileNumber:
                  type: integer
                traceFileSize:
                  type: integer
                traceToTCP:
                  type: boolean
                traceTCPPort:
                  type: integer
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/trace/topic:
    get:
      tags:
      - Core_Trace
      description: Get trace levels of the trace topics
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    topic:
                      type: string
                    level:
                      type: string
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_Trace
      description: Set trace levels of the trace topics. Only the levels of the topics
        which should be changed have to be included in the request.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  topic:
                    type: string
                  level:
                    type: string
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/trace/component:
    get:
      tags:
      - Core_Trace
      description: Get components and their enabled state
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    module:
                      type: string
                    enabled:
                      type: boolean
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_Trace
      description: Set enabled state of the components. Only the modules of the enabled
        state should be changed have to be included in the request.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  module:
                    type: string
                  enabled:
                    type: boolean
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/trace/level:
    get:
      tags:
      - Core_Trace
      description: Get trace level of all the trace topics. Returns the HTTP error
        500 if the trace level is not the same for all trace topics.
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                type: object
                properties:
                  level:
                    type: string
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_Trace
      description: Set trace levels of the all trace topics
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  type: string
        required: true
      responses:
        200:
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/users:
    get:
      tags:
      - Core_User_Management
      description: This operation provides a summary data of all users.
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/coreUsers'
        410:
          description: Gone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_User_Management
      description: Add a new user to the system. Note that if a "pkiSessionId" is
        specified, it must be a temporary PKI created with no associated user. The
        content of that PKI will be set as the certificates identifying the newly
        created user. The pkiSessionId wil be invalidated by this call.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreUserToCreate'
        required: true
      responses:
        200:
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreIdModel'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/users/{user_id}:
    get:
      tags:
      - Core_User_Management
      description: Returns detailed information on the specified user.
      parameters:
      - in: path
        name: user_id
        description: The value from the example is the admin's user id.
        schema:
          type: string
          example: 396cd7a3-d171-40d5-9922-530a4cb62633
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreUserToRetrieve'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    put:
      tags:
      - Core_User_Management
      description: Modifies details of the specified user. Only the specified values
        will be modified in the backend. In addition to administrator, the user itself
        is allowed to set the details. Note that if a "pkiSessionId" is specified,
        it must be a temporary PKI created for the user being edited. The content
        of that PKI will be set as the certificates identifying that user. The pkiSessionId
        wil be invalidated by this call.
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreUserToModify'
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    delete:
      tags:
      - Core_User_Management
      description: Delete the user.
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      responses:
        202:
          description: Accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/users/{user_id}/groups:
    get:
      tags:
      - Core_User_Management
      description: Returns the group names the specified user name is part of. An
        authenticated user can call this command for itself even if it is not Administrator.
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreUserPartOfGroupsToRetrieve'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    put:
      tags:
      - Core_User_Management
      description: "Modifies the assignement of the specified user to the groups identified\
        \ by value of the key \u201Ename\u201C. The boolean value of key \u201Eassign\u201C\
        \ specified wether the user is to be assigned/de-assigned to/from the named\
        \ group. The assignement relationship of the user to the groups which are\
        \ not mentioned in the json remain unchanged."
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreUserPartOfGroupsToModify'
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/users/{user_id}/usage:
    get:
      tags:
      - Core_User_Management
      description: "Returns the context in which the the specified user name is used.\
        \ The \u201Ccontext\u201D means a list of entities specified by their names,\
        \ grouped under a context-type."
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreUserContextToRetrieve'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/users/{user_id}/description:
    post:
      tags:
      - Core_User_Management
      description: Change user description.
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreUserDescription'
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/groups:
    get:
      tags:
      - Core_Group_Management
      description: Get data of all groups.
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreGroupsToRetrieve'
    post:
      tags:
      - Core_Group_Management
      description: Create a new group - not needed for Raven Rev1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreGroupToCreate'
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/groups/{group_name}:
    put:
      tags:
      - Core_Group_Management
      description: Create a new group. The name of the new group shall be part of
        the URI (see <group name>).
      parameters:
      - in: path
        name: group_name
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    delete:
      tags:
      - Core_Group_Management
      description: Delete the group.
      parameters:
      - in: path
        name: group_name
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/groups/{group_name}/users:
    get:
      tags:
      - Core_Group_Management
      description: Get data of all users of the group.
      parameters:
      - in: path
        name: group_name
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreUsersFromGroupToRetrieve'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
    post:
      tags:
      - Core_Group_Management
      description: Add a user to the group.
      parameters:
      - in: path
        name: group_name
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreUserAddedToGroup'
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/groups/{group_name}/users/{user_id}:
    delete:
      tags:
      - Core_Group_Management
      description: Delete a user from the group.
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      - in: path
        name: group_name
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        405:
          description: Method is not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/edit-user-certificates:
    post:
      tags:
      - Core_User_Certificate_Management
      description: Creates a temporary PKI for the user certificates - associated
        to the specified user, or for a user that will be created if the given user
        is null. The content is copied from the specified user. Note that if there
        is already a temporary PKI associated to the specified user, that PKI will
        be deleted.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coreEditUserCertificateRequest'
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coreEditUserCertificateRespons'
        400:
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
  /runtime/core/edit-user-certificates/{session_GUID}:
    delete:
      tags:
      - Core_User_Certificate_Management
      description: Deletes the specified temporary PKI (so all changes on it are cancelled).
      parameters:
      - in: path
        name: session_GUID
        schema:
          type: string
        required: true
      responses:
        200:
          description: OK success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        404:
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseOthers'
        500:
          description: Internal server error.
